<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Gazzera Viva</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #faebe4; /* Il tuo colore beige caldo di sfondo */
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* BARRA IN ALTO */
    header {
      background-color: #ffffff;
      padding: 10px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e5d5cc;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 100;
      height: 60px;
    }

    .hashtag {
      font-weight: 800;
      font-size: 13px;
      color: #000000;
    }

    .associazione-logo {
      text-align: right;
      font-size: 11px;
      font-weight: bold;
      line-height: 1.2;
      color: #000000;
    }

    /* CONTENUTO CENTRALE */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin-top: 60px; 
      margin-bottom: 70px; 
    }

    .promo-container {
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .promo-image {
      width: 100%;
      height: auto;
      max-height: 65vh;
      object-fit: contain;
      border: none;
    }

    /* BARRA DI NAVIGAZIONE IN BASSO */
    .navbar {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 70px;
      background-color: #faebe4; /* Sfondo uniforme */
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
    }

    .nav-item {
      text-decoration: none;
      color: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      height: 100%;
    }

    .nav-item:active {
      background-color: rgba(226, 109, 52, 0.1);
    }

    .nav-item i {
      font-size: 26px; 
      margin-bottom: 5px;
    }

    .nav-item span {
      font-size: 13px;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <!-- BARRA SUPERIORE -->
  <header>
    <div class="hashtag">❤️ #farelaspesasottocasa</div>
    <div class="associazione-logo">
      Associazione<br>Commercianti<br>Artigiani<br>Gazzera
    </div>
  </header>

  <!-- PARTE CENTRALE -->
  <main>
    <div class="promo-container">
      <img src="https://lh3.googleusercontent.com/d/1D1qjrYM4cgt0aqd1Av0in-6atfaxLjrL" alt="Gazzera Viva" class="promo-image">
    </div>
  </main>

  <!-- MENU IN BASSO -->
  <nav class="navbar">
    <a href="https://padlet.com/gazzeraviva/vetrina-prodotti-jb0svs3ohqs8ry04" class="nav-item">
      <i class="fa-solid fa-house"></i>
      <span>Prodotti</span>
    </a>
    
    <a href="https://padlet.com/gazzeraviva/eventi-4qrhweyz8479wr2j" class="nav-item">
      <i class="fa-solid fa-music"></i>
      <span>Eventi</span>
    </a>
    
    <a href="https://padlet.com/gazzeraviva/comunity-eatejib5395ro1y0" class="nav-item">
      <i class="fa-solid fa-users"></i>
      <span>Comunity</span>
    </a>
  </nav>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>

</body>
</html>
